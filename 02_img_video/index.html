<!DOCTYPE html>
<!--declara el tipo de documento. indica al navegador que usara HTML5-->
<html lang="es">
<!--elemento principal del documento html. Lang="es" indica que el contenido esta en español-->

<head><!--seccion de configuracion de documento -->
    <meta charset="UTF-8">
    <!--DEFINE LA CODIFICACION DE CARACTERES YA OKEI-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--hace que el sitio sea responsive. permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>practicando HTML - img - video

</HTML>
</title>
<!--titulo q aparece en el navegador-->
<meta name="author" content="Estefano Poblete">

<link rel="stylesheet" href="static/css/style.css">
<!--conexion con hoja CSS de estilos-->

</head>

<body>
    <header><!--encabezao del documento-->
        <h1>sitio multimedia personal</h1>
    </header>
    <hr>
    <main>
        <h2>Mis datos:</h2>
        <p>Nombre: Estefano Poblete<br> <!--br es un salto de lineaa-->
            Curso: 3°C
        </p>
        <hr>
        <h2>galeria multimedia</h2>
        <p>imagen de ejemplo</p>
        <img src="static/images/imagen1.png" alt="primera imagen" width="200">
        <img src="static/images/imagen2.png" alt="segunda imagen" width="200">
        <img src="static/images/imagen3.png" alt="segunda imagen" width="160">
        <hr>
        <h2>videos</h2>
        <video width="550" controls>
            <source src="static/videos/video1.mp4" type="video/mp4">
            
        </video>
        <video width="550" controls>
            <source src="static/videos/video2.mp4" type="video/mp4">
        </video>
    </main>
    <footer>
        <p style="text-align:center">Todos los derechos reservados
            -<a href="https://jujutsu-kaisen.fandom.com/es/wiki/Jujutsu_Kaisen_Wiki">Mas informacion</a> <!--etiqueta <a> para vinculos-->
            
        </p>
    </footer>
</body>

</html>
